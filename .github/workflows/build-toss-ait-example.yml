# Windows에서 granite build 가 실패할 때: GitHub(Linux)에서 .ait 생성 후 아티팩트로 내려받기
# 사용: Actions → "Build Toss AIT (example)" → Run workflow → Artifacts
# 푸시 시 GitHub CLI에 workflow 권한이 필요합니다: gh auth refresh -h github.com -s workflow

name: Build Toss AIT (example)

on:
  workflow_dispatch:

jobs:
  build-ait:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone official examples
        run: git clone --depth 1 https://github.com/toss/apps-in-toss-examples.git _ait_src

      - name: Install & build
        working-directory: _ait_src/examples
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Collect .ait files
        run: |
          mkdir -p ait_out
          find _ait_src -name "*.ait" -print
          find _ait_src -name "*.ait" -exec cp -f {} ait_out/ \;
          ls -la ait_out/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toss-ait-example
          path: ait_out/
          if-no-files-found: warn
